<!DOCTYPE html>
<html>
<head>
  <title>SmartSpend - AI Summary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #0f172a; display: flex; flex-direction: column; }

    .navbar {
      background: #0f172a;
      border-bottom: 2px solid rgba(16,185,129,0.3);
      padding: 0 28px; height: 64px;
      display: flex; align-items: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
      box-shadow: 0 2px 8px rgba(16,185,129,0.4);
    }
    .nav-brand-name { font-size: 18px; font-weight: 800; color: white; }

    .page-wrapper {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%);
    }

    .summary-card {
      background: white; border-radius: 20px;
      padding: 36px 32px;
      width: 100%; max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .card-header { text-align: center; margin-bottom: 28px; }
    .card-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 18px; display: flex; align-items: center;
      justify-content: center; font-size: 30px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(79,70,229,0.35);
    }
    .card-title { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: #64748b; }

    .ai-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #eef2ff; border: 1.5px solid #c7d2fe;
      color: #4f46e5; padding: 6px 16px; border-radius: 20px;
      font-size: 12px; font-weight: 700; margin-bottom: 20px;
    }

    .summary-box {
      background: linear-gradient(135deg, #0f172a, #1e3a5f);
      border-radius: 14px; padding: 24px;
      border: 1px solid rgba(16,185,129,0.2);
      margin-bottom: 24px;
    }
    .summary-text {
      color: #cbd5e1; font-size: 15px;
      line-height: 1.9; white-space: pre-line;
    }

    .back-btn {
      display: block; text-align: center;
      padding: 13px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white; border-radius: 10px;
      text-decoration: none; font-size: 14px; font-weight: 700;
      box-shadow: 0 4px 14px rgba(16,185,129,0.35);
      transition: 0.2s;
    }
    .back-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(16,185,129,0.45); }

    @media (max-width: 480px) {
      .summary-card { padding: 24px 18px; }
      .card-title { font-size: 20px; }
      .summary-text { font-size: 14px; }
      .navbar { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="nav-brand">
      <div class="nav-brand-icon">💰</div>
      <div class="nav-brand-name">SmartSpend</div>
    </a>
  </nav>

  <div class="page-wrapper">
    <div class="summary-card">
      <div class="card-header">
        <div class="card-icon">🤖</div>
        <div class="card-title">AI Spending Summary</div>
        <div class="card-sub">Smart analysis of your expenses</div>
      </div>

      <div style="text-align:center;">
        <span class="ai-badge">🤖 AI Generated</span>
      </div>

      <div class="summary-box">
        <div class="summary-text">{{ summary }}</div>
      </div>

      <a href="/" class="back-btn">← Back to Dashboard</a>
    </div>
  </div>

</body>
</html>
