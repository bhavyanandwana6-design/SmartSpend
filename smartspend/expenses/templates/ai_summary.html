<!DOCTYPE html>
<html>
<head>
  <title>SmartSpend - AI Summary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #eef2ff; background-image: radial-gradient(#c7d2fe 1px, transparent 1px); background-size: 25px 25px; padding: 16px; }
    .box { background: white; padding: 40px 32px; border-radius: 16px; box-shadow: 0 8px 30px rgba(99,102,241,0.12); width: 100%; max-width: 600px; }
    .logo { text-align: center; font-size: 22px; font-weight: 700; color: #4f46e5; margin-bottom: 4px; }
    .tagline { text-align: center; color: #888; font-size: 13px; margin-bottom: 25px; }
    .summary-box { background: #eef2ff; border-left: 5px solid #4f46e5; border-radius: 12px; padding: 20px; font-size: 15px; color: #333; line-height: 1.8; }
    .ai-badge { display: inline-block; background: #4f46e5; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 15px; }
    a { display: block; text-align: center; margin-top: 20px; color: #4f46e5; text-decoration: none; font-size: 13px; font-weight: 600; }
    @media (max-width: 480px) {
      .box { padding: 28px 20px; }
      .summary-box { font-size: 14px; padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">💰 SmartSpend</div>
    <div class="tagline">AI Spending Summary</div>
    <div class="summary-box">
      <span class="ai-badge">🤖 AI Generated</span>
      <p>{{ summary }}</p>
    </div>
    <a href="/">← Back to Dashboard</a>
  </div>
</body>
</html>
