<!DOCTYPE html>
<html>
<head>
  <title>SmartSpend - Edit Expense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; background: #0f172a; display: flex; flex-direction: column; }

    .navbar {
      background: #0f172a;
      border-bottom: 2px solid rgba(16,185,129,0.3);
      padding: 0 28px; height: 64px;
      display: flex; align-items: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 18px;
      box-shadow: 0 2px 8px rgba(16,185,129,0.4);
    }
    .nav-brand-name { font-size: 18px; font-weight: 800; color: white; }

    .page-wrapper {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 32px 16px;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%);
    }

    .form-card {
      background: white; border-radius: 20px;
      padding: 36px 32px;
      width: 100%; max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .card-header { margin-bottom: 28px; }
    .card-title { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: #64748b; }

    .input-group { margin-bottom: 16px; }
    .input-label { font-size: 11px; font-weight: 700; color: #374151; letter-spacing: 0.7px; display: block; margin-bottom: 7px; text-transform: uppercase; }
    .input-field {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 14px; color: #1e293b; background: #f8fafc;
      font-family: 'Inter', sans-serif; transition: 0.2s;
    }
    .input-field:focus { outline: none; border-color: #10b981; background: white; box-shadow: 0 0 0 3px rgba(16,185,129,0.12); }

    .submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 16px rgba(16,185,129,0.4);
      transition: 0.2s; margin-top: 8px;
    }
    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(16,185,129,0.5); }

    .back-link {
      display: block; text-align: center; margin-top: 16px;
      color: #64748b; text-decoration: none; font-size: 13px; font-weight: 500;
    }
    .back-link:hover { color: #10b981; }

    @media (max-width: 480px) {
      .form-card { padding: 24px 18px; }
      .card-title { font-size: 20px; }
      .navbar { padding: 0 16px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="nav-brand">
      <div class="nav-brand-icon">💰</div>
      <div class="nav-brand-name">SmartSpend</div>
    </a>
  </nav>

  <div class="page-wrapper">
    <div class="form-card">
      <div class="card-header">
        <div class="card-title">Edit Expense ✏️</div>
        <div class="card-sub">Update your expense details</div>
      </div>

      <form method="POST">
        {% csrf_token %}
        <div class="input-group">
          <label class="input-label">Title</label>
          <input type="text" name="title" class="input-field" value="{{ expense.title }}" required>
        </div>
        <div class="input-group">
          <label class="input-label">Amount (₹)</label>
          <input type="number" name="amount" class="input-field" value="{{ expense.amount }}" step="0.01" required>
        </div>
        <div class="input-group">
          <label class="input-label">Category</label>
          <select name="category" class="input-field">
            <option {% if expense.category == 'Food' %}selected{% endif %}>Food</option>
            <option {% if expense.category == 'Travel' %}selected{% endif %}>Travel</option>
            <option {% if expense.category == 'Education' %}selected{% endif %}>Education</option>
            <option {% if expense.category == 'Bills' %}selected{% endif %}>Bills</option>
            <option {% if expense.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
            <option {% if expense.category == 'Other' %}selected{% endif %}>Other</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label">Date</label>
          <input type="date" name="date" class="input-field" value="{{ expense.date|date:'Y-m-d' }}" required>
        </div>
        <div class="input-group">
          <label class="input-label">Note (Optional)</label>
          <textarea name="note" class="input-field" rows="3" style="resize:none;">{{ expense.note }}</textarea>
        </div>
        <button type="submit" class="submit-btn">Save Changes →</button>
      </form>
      <a href="/" class="back-link">← Back to Dashboard</a>
    </div>
  </div>

</body>
</html>
