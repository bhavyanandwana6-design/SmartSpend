<!DOCTYPE html>
<html>
<head>
  <title>SmartSpend - Edit Expense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #eef2ff; background-image: radial-gradient(#c7d2fe 1px, transparent 1px); background-size: 25px 25px; padding: 16px; }
    .box { background: white; padding: 40px 32px; border-radius: 16px; box-shadow: 0 8px 30px rgba(99,102,241,0.12); width: 100%; max-width: 400px; }
    .logo { text-align: center; font-size: 22px; font-weight: 700; color: #4f46e5; margin-bottom: 4px; }
    .tagline { text-align: center; color: #888; font-size: 13px; margin-bottom: 25px; }
    label { font-size: 12px; color: #555; font-weight: 600; display: block; margin: 12px 0 5px; letter-spacing: 0.5px; }
    input, select, textarea { width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 9px; font-size: 14px; color: #333; transition: 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 9px; cursor: pointer; font-size: 15px; font-weight: 600; margin-top: 20px; }
    button:hover { background: #4338ca; }
    a { display: block; text-align: center; margin-top: 14px; color: #4f46e5; text-decoration: none; font-size: 13px; }
    @media (max-width: 480px) {
      .box { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">💰 SmartSpend</div>
    <div class="tagline">Edit Expense</div>
    <form method="POST">
      {% csrf_token %}
      <label>TITLE</label>
      <input type="text" name="title" value="{{ expense.title }}" required>
      <label>AMOUNT (₹)</label>
      <input type="number" name="amount" value="{{ expense.amount }}" step="0.01" required>
      <label>CATEGORY</label>
      <select name="category">
        <option {% if expense.category == 'Food' %}selected{% endif %}>Food</option>
        <option {% if expense.category == 'Travel' %}selected{% endif %}>Travel</option>
        <option {% if expense.category == 'Education' %}selected{% endif %}>Education</option>
        <option {% if expense.category == 'Bills' %}selected{% endif %}>Bills</option>
        <option {% if expense.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
        <option {% if expense.category == 'Other' %}selected{% endif %}>Other</option>
      </select>
      <label>DATE</label>
      <input type="date" name="date" value="{{ expense.date }}" required>
      <label>NOTE (OPTIONAL)</label>
      <textarea name="note" rows="3">{{ expense.note }}</textarea>
      <button type="submit">Save Changes →</button>
    </form>
    <a href="/">← Back to Dashboard</a>
  </div>
</body>
</html>
