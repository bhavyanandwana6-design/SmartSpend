<!DOCTYPE html>
<html>
<head>
  <title>SmartSpend - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #eef2ff;
      background-image: radial-gradient(#c7d2fe 1px, transparent 1px);
      background-size: 25px 25px;
    }
    .box { background: white; padding: 45px 40px; border-radius: 16px; box-shadow: 0 8px 30px rgba(99,102,241,0.12); width: 340px; }
    .logo { text-align: center; font-size: 26px; font-weight: 700; color: #4f46e5; margin-bottom: 6px; }
    .tagline { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
    label { font-size: 12px; color: #555; font-weight: 600; display: block; margin: 12px 0 5px; letter-spacing: 0.5px; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 9px; font-size: 14px; color: #333; transition: 0.2s; }
    input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
    button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 9px; cursor: pointer; font-size: 15px; font-weight: 600; margin-top: 20px; letter-spacing: 0.3px; }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">💰 SmartSpend</div>
    <div class="tagline">Track your expenses smartly</div>
    <form method="POST">
      {% csrf_token %}
      <label>USERNAME</label>
      <input type="text" name="username" placeholder="Enter username" required>
      <label>PASSWORD</label>
      <input type="password" name="password" placeholder="Enter password" required>
      <button type="submit">Login →</button>
    </form>
  </div>
</body>
</html>
